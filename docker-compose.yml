services:
  # ─── API Server ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uag_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://uag:secret@postgres:5432/uag_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY_HOURS: 168
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      UPLOAD_DIR: /app/uploads
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@uag.app}
      REFERRAL_SIGNUP_CREDIT: 0.50
      REFERRAL_TIP_PERCENTAGE: 0.10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - uag_net

  # ─── Asynq Worker (Celery equivalent) ────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: uag_worker
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://uag:secret@postgres:5432/uag_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@uag.app}
      REFERRAL_SIGNUP_CREDIT: 0.50
      REFERRAL_TIP_PERCENTAGE: 0.10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uag_net

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: uag_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: uag
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: uag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uag_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uag -d uag_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - uag_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Asynq Web UI (optional — monitor background tasks) ──────
  asynq_ui:
    image: hibiken/asynqmon:latest
    platform: linux/amd64
    container_name: uag_asynqmon
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - uag_net

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:

# ─── Networks ────────────────────────────────────────────────
networks:
  uag_net:
    driver: bridge
